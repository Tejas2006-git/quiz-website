<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Quiz Website</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Quiz Website</h1>

<!-- SUBJECT PAGE -->
<div id="subjectPage">
    <h2>Select a Subject</h2>

    <button onclick="startQuiz('HTML')">HTML</button>
    <button onclick="startQuiz('CSS')">CSS</button>
    <button onclick="startQuiz('JavaScript')">JavaScript</button>
    <button onclick="startQuiz('Aptitude')">Aptitude</button>
    <button onclick="startQuiz('DBMS')">DBMS</button>
    <button onclick="startQuiz('Python')">Python</button>
    <button onclick="startQuiz('Java')">Java</button>
    <button onclick="startQuiz('C')">C Programming</button>
    <button onclick="startQuiz('Operating System')">Operating System</button>
    <button onclick="startQuiz('Computer Networks')">Computer Networks</button>
</div>

<!-- QUIZ PAGE -->
<div id="quizPage" style="display:none">

    <h2 id="selectedSubject"></h2>

    <button id="startBtn" onclick="beginQuiz()">Start Quiz</button>
    <button id="homeBtn" onclick="goHome()"style="display:none;">Go Home</button>

    <p id="progress"></p>
    <p id="timer"></p>

    <h2 id="question"></h2>
    <div id="answers"></div>

    <h3 id="score"></h3>

</div>

<script src="script.js"></script>

</body>
</html>
