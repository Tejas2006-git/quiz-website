<!DOCTYPE html>
<html>

<head>
    <title>Quiz Website</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Quiz Website</h1>

<!-- SUBJECT SELECTION PAGE -->
<div id="subjectPage">

<h2>Select a Subject</h2>

<button onclick="startQuiz('DBMS')">DBMS</button><br><br>
<button onclick="startQuiz('Aptitude')">Aptitude</button><br><br>
<button onclick="startQuiz('HTML')">HTML</button><br><br>
<button onclick="startQuiz('CSS')">CSS</button><br><br>
<button onclick="startQuiz('JavaScript')">JavaScript</button><br><br>
<button onclick="startQuiz('Python')">Python</button><br><br>
<button onclick="startQuiz('Java')">Java</button><br><br>
<button onclick="startQuiz('C')">C Programming</button><br><br>
<button onclick="startQuiz('Operating System')">Operating System</button><br><br>
<button onclick="startQuiz('Computer Networks')">Computer Networks</button>

</div>


<!-- QUIZ PAGE -->
<div id="quizPage" style="display:none">

<h2 id="selectedSubject"></h2>

<h2 id="question">Question will appear here</h2>

<div id="answers">

<button class="option" onclick="checkAnswer(0)">Option 1</button><br><br>
<button class="option" onclick="checkAnswer(1)">Option 2</button><br><br>
<button class="option" onclick="checkAnswer(2)">Option 3</button><br><br>
<button class="option" onclick="checkAnswer(3)">Option 4</button>

</div>

<br>

<button id="nextBtn" onclick="nextQuestion()">Next Question</button>

<h3 id="score"></h3>

</div>

<script src="script.js"></script>

</body>
</html>
